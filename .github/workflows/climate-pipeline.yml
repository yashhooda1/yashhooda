name: ClimatePulse — weekly data refresh

on:
  schedule:
    - cron: '0 4 * * 0'    # Every Sunday 04:00 UTC
  workflow_dispatch:         # Manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas scikit-learn numpy requests

      - name: Run pipeline
        env:
          NOAA_TOKEN: ${{ secrets.NOAA_TOKEN }}
        run: python scripts/climate_pipeline.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/climate_gold.json
          git diff --staged --quiet \
            || git commit -m "chore: refresh ClimatePulse gold data [skip ci]"
          git push
